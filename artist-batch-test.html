<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artist Batch Test</title>
<style>body{margin:0;background:#080808;color:#eee;font:15px Arial;padding:28px}h1,h2{text-transform:uppercase}.yellow{color:#ffc400}.summary{display:flex;gap:12px;flex-wrap:wrap}.box{padding:16px 20px;background:#111;border:1px solid #444}.tools{display:flex;gap:10px;margin:22px 0}.tools input,.tools select{background:#111;color:#fff;border:1px solid #555;padding:12px}.tools input{min-width:300px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}.card{background:#111;border:1px solid #333;padding:14px}.card b{display:block;font-size:17px}.card span{color:#aaa}.public{border-color:#ffc400}.errors{white-space:pre-wrap;background:#140707;border:1px solid #7b2222;padding:18px}.ok{background:#101408;border:1px solid #6f8d24;padding:18px}</style></head><body>
<h1>Phase 3.35 Artist Batch Test</h1><div class="summary" id="summary"></div><div id="validation"></div>
<div class="tools"><input id="q" type="search" placeholder="Search the 100-record batch"><select id="role"><option value="all">All roles</option><option>DJ</option><option>MC</option></select><select id="status"><option value="all">All statuses</option><option value="public">Public</option><option value="staged">Staged</option></select></div><div class="grid" id="grid"></div>
<script src="artists-data.js"></script><script src="artist-data-validator.js"></script><script>
const data=window.BTOS_ARTISTS,v=window.BTOS_ARTIST_VALIDATION;summary.innerHTML=`<div class="box"><b class="yellow">${v.total}</b><br>Batch records</div><div class="box"><b class="yellow">${v.public}</b><br>Public tests</div><div class="box"><b class="yellow">${v.staged}</b><br>Staged</div>`;validation.innerHTML=v.errors.length?`<div class="errors"><b>Errors</b>\n${v.errors.join('\n')}</div>`:`<div class="ok"><b>Validation passed</b>${v.warnings.length?`<br>${v.warnings.length} non-blocking warnings`:'<br>No warnings'}</div>`;
function render(){const query=q.value.toLowerCase(),r=role.value,s=status.value;grid.innerHTML=data.filter(a=>(!query||(`${a.name} ${a.id}`).toLowerCase().includes(query))&&(r==='all'||a.role===r)&&(s==='all'||(s==='public')===a.public)).map(a=>`<div class="card ${a.public?'public':''}"><b>${a.name}</b><span>${a.role} · ${a.public?'PUBLIC':'STAGED'}</span><br><small>${a.id}</small>${a.public?`<p><a class="yellow" href="artist.html?id=${a.id}">Open test profile →</a></p>`:''}</div>`).join('')}q.oninput=render;role.onchange=render;status.onchange=render;render();</script></body></html>
