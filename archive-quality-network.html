<!doctype html><meta charset="utf-8"><title>Archive Quality Network</title><style>body{padding:28px;background:#080808;color:#eee;font:15px Arial}h1,h2{color:#ffc400}table{width:100%;border-collapse:collapse;background:#111;margin-bottom:28px}th,td{padding:9px;border:1px solid #333;text-align:left}</style><h1>Archive Quality & Duplicate Review</h1><h2>Missing content queue</h2><table><thead><tr><th>Type</th><th>ID</th><th>Name</th><th>Issue</th></tr></thead><tbody id="queue"></tbody></table><h2>Duplicate-name candidates</h2><div id="duplicates"></div><script src="archive-quality-network.js"></script><script>const d=window.BTOS_NETWORK_QUALITY;document.querySelector("#queue").innerHTML=d.queue.map(x=>`<tr><td>${x.type}</td><td>${x.id}</td><td>${x.name}</td><td>${x.issue}</td></tr>`).join("");document.querySelector("#duplicates").innerHTML=d.duplicates.map(x=>`<p><b>${x.normalized}</b>: ${x.records.map(r=>`${r.name} (${r.id})`).join(" / ")}</p>`).join("")||"<p>No duplicate candidates.</p>"</script>
